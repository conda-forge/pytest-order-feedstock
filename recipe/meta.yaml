{% set name = "pytest-order" %}
{% set version = "1.4.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 327fb6eee1ae771051da13d2a0d9306d947e87f9ab8f4d6302e5d122c7472691

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - pytest >=5.0
    - setuptools
  run:
    - python >={{ python_min }}
    - pytest >=5.0

test:
  imports:
    - pytest_order
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pytest-dev/pytest-order
  doc_url: https://pytest-order.readthedocs.io/
  summary: pytest plugin that allows to customize the test execution order
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hadim
    - mrbean-bremen
